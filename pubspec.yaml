name: sst
description: "Notes and shopping list app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # Media / file handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  record: ^5.1.2
  open_filex: ^4.4.1

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.0

flutter:
  uses-material-design: true
